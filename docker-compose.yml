services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - cvi_data:/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/cvi.db
      - AUTHENTIK_ISSUER_URL=${AUTHENTIK_ISSUER_URL}
      - AUTHENTIK_ADMIN_GROUP=${AUTHENTIK_ADMIN_GROUP:-cvi-admin}
      - AUTHENTIK_EXPERT_GROUP=${AUTHENTIK_EXPERT_GROUP:-cvi-expert}
      - APP_ENV=${APP_ENV:-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000"]}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  cvi_data:
